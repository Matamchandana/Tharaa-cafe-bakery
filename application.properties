spring.application.name=store
# Tells Java where to find your running MySQL database on your local machine:
spring.datasource.url=jdbc:mysql://localhost:3306/bakerydb?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
# CRITICAL: Replace 'your_password' with your actual local MySQL root password string:
spring.datasource.password=@Moon2starr
# Tells Hibernate to auto-update tables if changes happen in your Java entities:
spring.jpa.hibernate.ddl-auto=update
# Logs SQL statements in your VS Code terminal console so you can inspect queries live:
spring.jpa.show-sql=true